<!DOCTYPE html>
<html>

<head>
  <title>Chatbot</title>
</head>

<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    margin-top: 0;
    margin-bottom: 0;

  }

  .send-button {
    background-color: rgb(25, 135, 84);
    color: white;
    padding: 12px 20px;
    margin-left: 10px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
  }

  .chat-input {
    padding: 12px 15px;
    border-radius: 10px;
    border-width: 1px;
    font-size: 15px;
    flex-grow: 1;
    /*Takes up the entire space*/

  }

  .chat-input-container {
    display: flex;
    margin-bottom: 60px;
  }

  .app-container {
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;

    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .chat-message-user {
    display: flex;
    justify-content: end;
    align-items: start;
  }

  .chat-message-robot {
    display: flex;
    align-items: start;
  }

  .chat-message-text {
    background-color: rgb(238, 238, 238);
    padding: 15px 20px;
    border-radius: 10px;
    margin-right: 10px;
    margin-left: 10px;
    margin-bottom: 20px;
    max-width: 300px;
  }

  .chat-message-profile {
    width: 45px;
  }

  .chat-messages-container {
    flex-grow: 1;
    margin-top: 20px;
    overflow: scroll;
    /*Forces scrollbars to appear even if content fits (i.e., always scrollable box).*/
    scrollbar-width: none;
    /*Firefox-specific property to hide scrollbars (content still scrolls).*/
  }

  .txt-intro {
    text-align: center;
    color: gray;
  }

  .icon-loading {
    height: 40px;
    margin: -15px;
  }
</style>

<body>
  <div class="js-container"></div>

  <!--These are react external library-->
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <!--A specific version of react library by SuperSimpleDev-->

  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
  <!--Babel = translates JSX into JavaScript-->
  <script src="https://unpkg.com/supersimpledev/babel.js"></script> <!--First load the script tag-->
  <script type="text/babel"> //Then declare the type ="text/babel" to translate JSX into JS

    function useAutoScroll(dependencies) {
      const reference = React.useRef(); //useRef is a React hook that lets you remember a value without causing the component to re-render.
      React.useEffect(() => { //Run this code after React renders, or when something changes. Has 2 parts: effect function and dependency array(what changes)
        const containerElem = reference.current; //Grabs the DOM node for the messages container (the <div> with ref={chatMessagesRef}).

        if (containerElem) {
          containerElem.scrollTop = containerElem.scrollHeight; //Setting scrollTop equal to scrollHeight effectively scrolls to the very bottom (last message).
        }
      }, dependencies); //The effect re-runs only when the messages array changes—i.e., when a new user/robot message is added or the list updates. That’s the moment you want to auto‑scroll.
      return reference;
    }

    function ChatInput({ chatMessages, setChatMessages }) { //2nd Children of App()
      const [inputText, setInputText] = React.useState(''); //[Current Data, Updater Function]
      const [isLoading, setIsLoading] = React.useState(false);
      async function sendMessage() { //Asynchronous (async) code lets a program start an operation that takes time without blocking the main thread. This keeps apps responsive.
        if (isLoading || inputText === '') {
          return;
        }
        setIsLoading(true);

        const newChatMessages = [
          ...chatMessages, { //Spread(...) - takes the values in an array, and copies them into a new array
            message: inputText,
            sender: 'user',
            id: crypto.randomUUID()
          }
        ]

        setChatMessages(newChatMessages);
        setChatMessages([
          ...newChatMessages,
          {
            message: <img className="icon-loading" src="loading-spinner.gif" />,
            sender: 'robot',
            id: crypto.randomUUID()
          }
        ]);
        setInputText('');
        const response = await Chatbot.getResponseAsync(inputText); //await can be used only inside async functions. It pauses the function’s execution until the awaited Promise settles (fulfilled or rejected)
        setChatMessages([
          ...newChatMessages, {
            message: response,
            sender: 'robot',
            id: crypto.randomUUID()
          }
        ]);
        setIsLoading(false);

        //setInputText('');
      }

      return (
        <div className="chat-input-container">
          <input
            placeholder="Send a message to chatbot"
            size="30"
            onChange={(event) => { setInputText(event.target.value) }}
            // onChange fires whenever the input’s value changes (on every keystroke for text inputs). 
            // event.target.value - Get the current value of the element that triggered this event.

            value={inputText} //value is the current text/content shown in a form element like textbox. Partnered with onChange
            onKeyDown={(event) => { event.key === 'Enter' && sendMessage() }}
            //onKeyDown runs when any key is pressed down while the input is focused. Used for Enter
            //condition && doSomething() executes the right side only if the condition is true.

            className="chat-input"
          />
          <button
            onClick={sendMessage}
            className='send-button'>
            Send</button>
        </div>
      )
    }

    function ChatMessages({ chatMessages }) { //const chatMessages = props.chatMessages
      const chatMessagesRef = useAutoScroll([chatMessages]); 
      return (
        <div className="chat-messages-container"
          ref={chatMessagesRef}>
          {/*<button onClick={sendMessage}>Send message</button>*/}
          {chatMessages.map((chatMessage) => ( //.map() takes an array,loops through, then returns a new array with each item changed.
            <ChatMessage
              sender={chatMessage.sender}
              message={chatMessage.message}
              key={chatMessage.id} />
          )
          )}
        </div>
      )
    }

    function ChatMessage({ sender, message }) {
      return (
        <div className={sender === 'user' ? 'chat-message-user' : "chat-message-robot"}>{/*Using conditional statement when setting a class name; if true do left of colon; if false do right*/}

          {sender === 'robot' && (<img src="robot.png" alt="" className="chat-message-profile" />)} {/*If the left side is true, execute right; if it is false, disregard*/}
          <div className="chat-message-text">{message}</div>
          {sender === 'user' && (<img src="user.png" alt="" className="chat-message-profile" />)} {/*Left side: boolean condition; Right Side: Execute if true*/}
        </div>
      );
    }

    function App() { //Root Component
      const [chatMessages, setChatMessages] = React.useState([])

      return (

        <div className="app-container">
          {chatMessages.length === 0 && <p className="txt-intro">Welcome to Chatbot Project! Send a message using the textbox below</p>}
          <ChatMessages
            chatMessages={chatMessages}
          />
          <ChatInput
            chatMessages={chatMessages}
            setChatMessages={setChatMessages} />
        </div>
      );
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />); //This is the function App()
  </script>
</body>

</html>
